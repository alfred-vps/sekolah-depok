<style>
:root {
  --blue: #2563eb;
  --blue-dark: #1d4ed8;
  --green: #16a34a;
  --gray-50: #f9fafb;
  --gray-100: #f3f4f6;
  --gray-200: #e5e7eb;
  --gray-300: #d1d5db;
  --gray-500: #6b7280;
  --gray-700: #374151;
  --gray-900: #111827;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--gray-50); color: var(--gray-900); min-height: 100vh; }

/* Header */
header { background: linear-gradient(135deg, var(--blue), #1e40af); color: white; padding: 1.25rem 1rem; text-align: center; position: sticky; top: 0; z-index: 20; }
header h1 { font-size: 1.25rem; margin-bottom: .15rem; }
header p { font-size: .75rem; opacity: .8; }

/* Layout */
.container { max-width: 1280px; margin: 0 auto; padding: .75rem; }

/* Filter Toggle - Mobile */
.filter-toggle-bar { display: flex; gap: .5rem; margin-bottom: .75rem; }
.filter-toggle-bar .btn-filter-toggle { flex: 1; display: flex; align-items: center; justify-content: center; gap: .4rem; padding: .65rem; background: white; border: 1px solid var(--gray-200); border-radius: 10px; font-size: .875rem; color: var(--gray-700); cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,.04); -webkit-tap-highlight-color: transparent; }
.filter-toggle-bar .btn-filter-toggle:active { background: var(--gray-100); }
.filter-toggle-bar .btn-filter-toggle .badge-count { background: var(--blue); color: white; border-radius: 999px; padding: .1rem .45rem; font-size: .7rem; font-weight: 600; min-width: 1.2rem; text-align: center; }
.btn-filter-reset-mobile { padding: .65rem .9rem; background: white; border: 1px solid var(--gray-200); border-radius: 10px; font-size: .875rem; color: var(--gray-500); cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
.btn-filter-reset-mobile:active { background: var(--gray-100); }

/* Filter Overlay - Mobile */
.filter-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: rgba(0,0,0,.4); }
.filter-overlay.open { display: block; }
.filter-sheet { position: absolute; bottom: 0; left: 0; width: 100%; max-height: 88vh; background: white; border-radius: 16px 16px 0 0; overflow-y: auto; padding: 1rem 1.25rem 2rem; animation: slideUp .25s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.filter-sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; padding-bottom: .75rem; border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; background: white; z-index: 1; }
.filter-sheet-header h2 { font-size: 1.125rem; }
.filter-sheet-header .btn-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--gray-500); padding: .25rem; line-height: 1; -webkit-tap-highlight-color: transparent; }
.filter-sheet-header .btn-apply { padding: .5rem 1.25rem; background: var(--blue); color: white; border: none; border-radius: 8px; font-size: .875rem; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }

/* Filter Groups (shared desktop + mobile) */
.filter-group { margin-bottom: 1.25rem; }
.filter-group:last-child { margin-bottom: 0; }
.filter-group label.filter-label { display: block; font-size: .6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--gray-500); margin-bottom: .5rem; }
.filter-group select,
.filter-group input[type="text"] { width: 100%; padding: .6rem .75rem; border: 1px solid var(--gray-200); border-radius: 8px; font-size: .875rem; background: white; -webkit-appearance: none; appearance: none; }
.filter-group select:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .35rem .5rem; }
.checkbox-grid.three-col { grid-template-columns: 1fr 1fr 1fr; }
.checkbox-grid label { display: flex; align-items: center; gap: .4rem; font-size: .8125rem; color: var(--gray-700); cursor: pointer; padding: .2rem 0; -webkit-tap-highlight-color: transparent; }
.checkbox-grid input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--blue); flex-shrink: 0; }

/* Desktop Filter Sidebar */
@media (min-width: 769px) {
  .container { display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; padding: 1.5rem; }
  .filter-toggle-bar { display: none; }
  .filter-overlay.open { display: none !important; }
  .filters-desktop { background: white; border-radius: 12px; padding: 1.25rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); height: fit-content; position: sticky; top: 5rem; }
}
@media (max-width: 768px) {
  .filters-desktop { display: none; }
  .filter-overlay.open { display: block; }
}

/* Results Header */
.results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: .75rem; }
.results-header h2 { font-size: 1rem; color: var(--gray-700); }
.results-header .result-count { font-size: .8125rem; color: var(--gray-500); }

/* School Grid */
.school-grid { display: grid; grid-template-columns: 1fr; gap: .75rem; }
@media (min-width: 640px) { .school-grid { grid-template-columns: 1fr 1fr; } }
@media (min-width: 1024px) { .school-grid { grid-template-columns: 1fr 1fr 1fr; } }

/* School Card */
.school-card { background: white; border-radius: 12px; padding: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); transition: box-shadow .15s; }
.school-card:active { box-shadow: 0 2px 8px rgba(0,0,0,.12); }
.school-card h3 { font-size: .9375rem; margin-bottom: .3rem; }
.school-card .badges { display: flex; flex-wrap: wrap; gap: .3rem; margin-bottom: .6rem; }
.badge { display: inline-flex; align-items: center; padding: .15rem .45rem; border-radius: 999px; font-size: .65rem; font-weight: 500; }
.badge-negeri { background: #dbeafe; color: #1d4ed8; }
.badge-swasta { background: #fce7f3; color: #be185d; }
.badge-akreditasi-a { background: #dcfce7; color: #15803d; }
.badge-akreditasi-b { background: #fef9c3; color: #a16207; }
.badge-full-day { background: #ede9fe; color: #6d28d9; }
.school-card .details { display: grid; grid-template-columns: 1fr 1fr; gap: .2rem .5rem; font-size: .75rem; color: var(--gray-500); margin-bottom: .6rem; }
.school-card .details span { display: flex; align-items: center; gap: .2rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.school-card .facilities { display: flex; flex-wrap: wrap; gap: .25rem; }
.school-card .facilities em { font-style: normal; padding: .1rem .35rem; background: var(--gray-100); border-radius: 4px; font-size: .65rem; color: var(--gray-500); }
.school-card .description { font-size: .75rem; color: var(--gray-500); margin-top: .4rem; line-height: 1.5; border-top: 1px solid var(--gray-100); padding-top: .4rem; }

/* No results */
.no-results { text-align: center; padding: 3rem 1rem; color: var(--gray-500); grid-column: 1 / -1; }
.no-results strong { display: block; font-size: 1rem; margin-bottom: .25rem; color: var(--gray-700); }

/* Footer */
footer { text-align: center; padding: 1.5rem .75rem; color: var(--gray-500); font-size: .6875rem; line-height: 1.6; }

/* Empty state active filters pill */
.active-filters { display: flex; flex-wrap: wrap; gap: .35rem; margin-bottom: .75rem; }
.active-filters .pill { display: inline-flex; align-items: center; gap: .3rem; padding: .25rem .5rem; background: var(--blue); color: white; border-radius: 999px; font-size: .7rem; font-weight: 500; }
.active-filters .pill .x { cursor: pointer; font-size: .8rem; line-height: 1; opacity: .7; -webkit-tap-highlight-color: transparent; }
.active-filters .pill .x:hover { opacity: 1; }
</style>
</head>

// Mirror filter IDs: mobile and desktop
const filterPairs = [
  ['search','search-d'], ['jenis','jenis-d'], ['budget','budget-d'], ['location','location-d'],
  ['kurikulum-group','kurikulum-group-d'], ['akreditasi-group','akreditasi-group-d'],
  ['fasilitas-group','fasilitas-group-d'], ['program-group','program-group-d']
];

function val(id) {
  const el = document.getElementById(id);
  if (!el) return '';
  return el.tagName === 'SELECT' || el.tagName === 'INPUT' ? el.value : '';
}

function getChecks(containerId) {
  const c = document.getElementById(containerId);
  if (!c) return [];
  return [...c.querySelectorAll('input:checked')].map(cb=>cb.value);
}

function setVal(id, v) {
  const el = document.getElementById(id);
  if (!el) return;
  if (el.tagName === 'SELECT' || el.tagName === 'INPUT') el.value = v;
}

function syncFilter(sourceId, targetId) {
  if (!sourceId || !targetId) return;
  const s = document.getElementById(sourceId);
  const t = document.getElementById(targetId);
  if (!s || !t) return;
  if (t.tagName === 'SELECT' || t.tagName === 'INPUT') {
    t.value = s.value;
  } else if (t.tagName === 'DIV') {
    // sync checkboxes
    const sChecks = [...s.querySelectorAll('input:checked')].map(c=>c.value);
    [...t.querySelectorAll('input')].forEach(cb => { cb.checked = sChecks.includes(cb.value); });
  }
}

function syncFilters() {
  // mobile -> desktop
  syncFilter('search','search-d');
  syncFilter('jenis','jenis-d');
  syncFilter('budget','budget-d');
  syncFilter('location','location-d');
  syncFilter('kurikulum-group','kurikulum-group-d');
  syncFilter('akreditasi-group','akreditasi-group-d');
  syncFilter('fasilitas-group','fasilitas-group-d');
  syncFilter('program-group','program-group-d');
}

function getEffectiveVal(id, mirrorId) {
  return window.innerWidth <= 768 ? val(id) : val(mirrorId);
}
function getEffectiveChecks(id, mirrorId) {
  return window.innerWidth <= 768 ? getChecks(id) : getChecks(mirrorId);
}

// Build filter options
const kurikulumList = [...new Set(schools.map(s=>s.kurikulum))].sort();
const locationList = [...new Set(schools.map(s=>s.location))].sort();
const akreditasiList = [...new Set(schools.map(s=>s.akreditasi))].sort();
const facilityList = [...new Set(schools.flatMap(s=>s.facilities))].sort();
const programList = [...new Set(schools.map(s=>s.program))].sort();

function populateChecks(containerId, items) {
  const c = document.getElementById(containerId);
  if (!c) return;
  items.forEach(item => {
    const label = document.createElement('label');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.value = item;
    cb.onchange = applyFilters;
    label.appendChild(cb);
    label.appendChild(document.createTextNode(' ' + item));
    c.appendChild(label);
  });
}

function populateSelect(containerId, items) {
  const sel = document.getElementById(containerId);
  if (!sel) return;
  items.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item;
    opt.textContent = item;
    sel.appendChild(opt);
  });
}

// Populate both mobile and desktop
['kurikulum-group','kurikulum-group-d'].forEach(id => populateChecks(id, kurikulumList));
['akreditasi-group','akreditasi-group-d'].forEach(id => populateChecks(id, akreditasiList));
['fasilitas-group','fasilitas-group-d'].forEach(id => populateChecks(id, facilityList));
['program-group','program-group-d'].forEach(id => populateChecks(id, programList));
['location','location-d'].forEach(id => populateSelect(id, locationList));

// Overlay
function openFilter() { document.getElementById('filterOverlay').classList.add('open'); }
function closeFilter() { document.getElementById('filterOverlay').classList.remove('open'); }

function fmtFee(fees) {
  if (fees === 0) return 'Gratis';
  if (fees >= 1000000) return `Rp ${(fees/1000000).toFixed(fees%1000000?1:0)} jt`;
  return `Rp ${(fees/1000).toFixed(0)} rb`;
}

function fmtFacility(f) {
  const map = { laboratorium:'Lab', lapangan:'Lapangan', perpustakaan:'Perpus', masjid:'Masjid', kantin:'Kantin', aula:'Aula', kolam_renang:'Kolam', bilingual:'Bilingual', kebun:'Kebun', asrama:'Asrama' };
  return map[f] || f;
}

function countActiveFilters() {
  let n = 0;
  if (getEffectiveVal('jenis','jenis-d') !== 'all') n++;
  if (getEffectiveVal('budget','budget-d') !== 'all') n++;
  if (getEffectiveVal('location','location-d') !== 'all') n++;
  if (getEffectiveChecks('kurikulum-group','kurikulum-group-d').length) n++;
  if (getEffectiveChecks('akreditasi-group','akreditasi-group-d').length) n++;
  if (getEffectiveChecks('fasilitas-group','fasilitas-group-d').length) n++;
  if (getEffectiveChecks('program-group','program-group-d').length) n++;
  return n;
}

function buildPills() {
  const c = document.getElementById('activePills');
  const pairs = [
    { id:'jenis', mid:'jenis-d', label:'Jenis', val:()=>getEffectiveVal('jenis','jenis-d') },
    { id:'budget', mid:'budget-d', label:'Biaya', val:()=>getEffectiveVal('budget','budget-d') },
    { id:'location', mid:'location-d', label:'Lokasi', val:()=>getEffectiveVal('location','location-d') },
    { id:'kurikulum-group', mid:'kurikulum-group-d', label:'Kurikulum', isCheck:true },
    { id:'akreditasi-group', mid:'akreditasi-group-d', label:'Akreditasi', isCheck:true },
    { id:'fasilitas-group', mid:'fasilitas-group-d', label:'Fasilitas', isCheck:true },
    { id:'program-group', mid:'program-group-d', label:'Program', isCheck:true }
  ];
  let html = '';
  pairs.forEach(p => {
    if (p.isCheck) {
      const vals = getEffectiveChecks(p.id, p.mid);
      vals.forEach(v => { html += `<span class="pill" onclick="removeFilter('${p.mid}', '${v}')">${p.label}: ${v} <span class="x">×</span></span>`; });
    } else {
      const v = p.val();
      if (v !== 'all') html += `<span class="pill" onclick="removeFilterSelect('${p.mid}')">${p.label}: ${v} <span class="x">×</span></span>`;
    }
  });
  c.innerHTML = html;
}

function removeFilter(mirrorId, val) {
  const container = document.getElementById(mirrorId);
  if (!container) return;
  const cb = container.querySelector(`input[value="${CSS.escape(val)}"]`);
  if (cb) cb.checked = false;
  // sync back if mobile is open
  if (window.innerWidth <= 768) {
    const mobileId = mirrorId.replace('-d', '');
    const mc = document.getElementById(mobileId);
    if (mc) { const cb2 = mc.querySelector(`input[value="${CSS.escape(val)}"]`); if (cb2) cb2.checked = false; }
  }
  applyFilters();
}

function removeFilterSelect(mirrorId) {
  const sel = document.getElementById(mirrorId);
  if (sel) { sel.value = 'all'; }
  // sync back
  if (window.innerWidth <= 768) {
    const mobileId = mirrorId.replace('-d', '');
    const ms = document.getElementById(mobileId);
    if (ms) ms.value = 'all';
  }
  applyFilters();
}

function applyFilters() {
  syncFilters();

  const isMobile = window.innerWidth <= 768;
  const search = (isMobile ? val('search') : val('search-d')).toLowerCase().trim();
  const jenis = getEffectiveVal('jenis','jenis-d');
  const budget = getEffectiveVal('budget','budget-d');
  const location = getEffectiveVal('location','location-d');
  const kurikulum = getEffectiveChecks('kurikulum-group','kurikulum-group-d');
  const akreditasi = getEffectiveChecks('akreditasi-group','akreditasi-group-d');
  const facilities = getEffectiveChecks('fasilitas-group','fasilitas-group-d');
  const programs = getEffectiveChecks('program-group','program-group-d');

  let filtered = schools.filter(s => {
    if (search && !s.name.toLowerCase().includes(search)) return false;
    if (jenis !== 'all' && s.type !== jenis) return false;
    if (location !== 'all' && s.location !== location) return false;
    if (budget !== 'all') {
      if (budget === '0' && s.fees !== 0) return false;
      if (budget === '500k' && (s.fees <= 0 || s.fees > 500000)) return false;
      if (budget === '1jt' && (s.fees < 500000 || s.fees > 1000000)) return false;
      if (budget === '3jt' && (s.fees < 1000000 || s.fees > 3000000)) return false;
      if (budget === '3jt+' && s.fees <= 3000000) return false;
    }
    if (kurikulum.length && !kurikulum.includes(s.kurikulum)) return false;
    if (akreditasi.length && !akreditasi.includes(s.akreditasi)) return false;
    if (facilities.length && !facilities.every(f => s.facilities.includes(f))) return false;
    if (programs.length && !programs.includes(s.program)) return false;
    return true;
  });

  document.getElementById('filterBadge').textContent = countActiveFilters();
  buildPills();
  renderResults(filtered);
}

function renderResults(list) {
  const grid = document.getElementById('school-grid');
  document.getElementById('result-count').textContent = `${list.length} sekolah ditemukan`;

  if (list.length === 0) {
    grid.innerHTML = '<div class="no-results"><strong>😕 Tidak ada sekolah</strong>Coba ubah filter atau reset</div>';
    return;
  }

  grid.innerHTML = list.map(s => `
    <div class="school-card">
      <h3>${s.name}</h3>
      <div class="badges">
        <span class="badge ${s.type==='Negeri'?'badge-negeri':'badge-swasta'}">${s.type}</span>
        <span class="badge badge-akreditasi-${s.akreditasi.toLowerCase()}">Akr ${s.akreditasi}</span>
        ${s.fullDay ? '<span class="badge badge-full-day">Full Day</span>' : ''}
      </div>
      <div class="details">
        <span>📚 ${s.kurikulum}</span>
        <span>💰 ${fmtFee(s.fees)}</span>
        <span>📍 ${s.location}</span>
        <span>🕌 ${s.program}</span>
      </div>
      <div class="facilities">${s.facilities.map(f => `<em>${fmtFacility(f)}</em>`).join('')}</div>
      ${s.desc ? `<div class="description">${s.desc}` : `<div class="description">`}
        ${s.website ? `<br><span style="font-size:.65rem;color:var(--gray-500)">🔗 <a href="${s.website}" target="_blank" rel="noopener" style="color:var(--gray-500);text-decoration:underline">${s.website}</a></span>` : `<br><span style="font-size:.65rem;color:var(--gray-500)">📝 ${s.dataNote}</span>`}
      </div>
    </div>
  `).join('');
}

function resetFilters() {
  ['search','search-d'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  ['jenis','jenis-d','budget','budget-d','location','location-d'].forEach(id => { const el = document.getElementById(id); if (el) el.value = 'all'; });
  ['kurikulum-group','kurikulum-group-d','akreditasi-group','akreditasi-group-d','fasilitas-group','fasilitas-group-d','program-group','program-group-d'].forEach(id => {
    const c = document.getElementById(id);
    if (c) { c.querySelectorAll('input').forEach(cb => cb.checked = false); }
  });
  applyFilters();
}

applyFilters();
</script>
